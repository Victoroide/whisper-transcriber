name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: wt-core
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: wt-core
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: wt-core.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Go binary
        working-directory: core
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          go build -ldflags="-s -w" -o bin/${{ matrix.binary }} ./cmd/wt-core/

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ui/requirements.txt
          pip install pyinstaller

      - name: Copy binary to UI
        run: |
          mkdir -p ui/app/bin
          cp core/bin/${{ matrix.binary }} ui/app/bin/

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --clean --name WhisperTranscriber --noconsole --windowed ui/app/main.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WhisperTranscriber-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/WhisperTranscriber/

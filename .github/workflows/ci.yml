name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v ./...

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ui/requirements.txt
          pip install -r ui/requirements-dev.txt

      - name: Run text and export tests
        run: python -m pytest tests/python/test_text_utils.py tests/python/test_export.py -v

      - name: Run transcription tests
        run: python -m pytest tests/python/test_transcription.py -v --timeout=120
        continue-on-error: true
